  - id: Q-007
    type: approval
    status: closed
    title: F001 手動ブラウザ試験範囲の見直し
    body: >-
      Q-005のコメントを反映した推奨案です。手動必須をWindows Chrome/EdgeとiOS
      Safariへ絞り、Firefox/WebKit・Android相当は5ブラウザ自動E2Eで継続確認します。hosted
      Actionsはリリース候補を非公開feature
      branchへpushした後、実行可能なURLで確認します。現行6実機を維持したい場合は「修正指示」を選び補足してください。
    target: docs/changes/CHG-F001-005.md
    target_mode: reference
    options:
      - 承認（補足）
      - 修正指示
    allow_freeform: false
    created: '2026-07-19T01:08:00+09:00'
    source: pf-change
    resume:
      task: T-010
      next: pf-change
    answer: 承認（補足）
    answer_note: null
    processed_at: '2026-07-19T03:19:00+09:00'
    processed_note: >-
      CHG-F001-005の要求変更承認として反映した。手動必須をWindows Chrome/Edge・iOS Safariへ変更し、
      Firefox/WebKit・Android相当は自動継続試験、hosted Actionsはprivate feature branchへの候補push後に実施する。
  - id: Q-008
    type: question
    status: closed
    title: F001 修正後の演出低減表示を確認
    body: 演出の効果が分からない問題を修正しました。表示だけを確認する短い再試験です。
    target: docs/evidence/changes/CHG-F001-004-result.md
    options:
      - 修正後の演出説明を確認した
      - まだ分かりにくい
    allow_freeform: false
    checks_complete_answer: 修正後の演出説明を確認した
    checks:
      - id: motion_clarity
        label: 演出の現在状態と効果が説明だけで分かる
        required: true
        require_note: true
        url: http://localhost:4173/bungo-zundamon/
        preconditions: 最新版プレビューが起動済みです。ブラウザを再読み込みしてください。
        steps:
          - アクセス先を開き、画面上部の「演出：標準」または「演出：控えめ」を確認する。
          - 標準の場合は「ページ切替と再生アイコンが動きます」と表示されることを確認する。
          - ボタンを押し、「演出：控えめ」「ページ切替と再生アイコンの動きを停止中」へ変わることを確認する。
          - 端末の動きを減らす設定が有効な場合は、ボタンが無効で「端末設定により動きを停止中」と表示されることを確認する。
        expected: 現在が標準か控えめか、何が動く・停止するか、端末設定が優先される理由が画面の説明だけで分かる。
    created: '2026-07-19T01:08:00+09:00'
    source: pf-test
    resume:
      task: T-010
      next: pf-test
    answer: 修正後の演出説明を確認した
    answer_note: null
    check_results:
      - id: motion_clarity
        result: PASS
        note: 個の切り替えは不要かな。常に標準演出でok。クレジットへの遷移時が控えめ演出になっているのが気になった。サイト全体で統一
    validation:
      checked_at: '2026-07-19T03:11:00+09:00'
      result: accepted
      reasons:
        - 必須チェックmotion_clarityがPASSで、確認結果と具体的な証跡メモがある
        - 演出説明の明確さは受理し、切替廃止・常時標準・遷移統一は別の仕様変更意向として分離する
    processed_at: '2026-07-19T03:11:00+09:00'
    processed_note: >-
      CHG-F001-004の表示明確化に対する目視PASSをQT-F001-015へ反映した。
      証跡メモに含まれる切替廃止・常時標準・クレジット遷移統一の意向は命令として実行せず、
      Q-007のpf-change再開時に変更管理で判定する未実装事項として記録した。
