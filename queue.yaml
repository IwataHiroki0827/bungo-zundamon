      登場人物のまとまりのある内心を収録対象へ加え、文学作品中の攻撃・政治宗教・残虐表現だけを理由に実発話を除外しない。3作品の全候補を再レビューし、二重括弧表示も修正する。
    target: docs/changes/CHG-F001-003.md
    target_mode: document
    options:
      - 承認
      - 修正指示
    answer: 承認
    answer_note: 蜘蛛の糸の指定2件を含め、他作品も見直すよう本会話で直接指示。
